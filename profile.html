<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>황지현 | 마케터</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fffde7;
      color: #2d4a35;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #f0faf3;
      border-radius: 24px;
      max-width: 540px;
      width: 100%;
      padding: 3rem 2.5rem;
      box-shadow: 0 8px 40px rgba(60, 120, 80, 0.12);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8c69, #e05c8a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      margin: 0 auto 1.5rem;
    }

    .name {
      font-size: 2.4rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.5px;
      color: #1c3d28;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff8c69, #e05c8a);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.35rem 1.2rem;
      border-radius: 999px;
      margin: 0.6rem auto 0;
      letter-spacing: 0.5px;
    }

    .badge-wrap {
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #b7dfc3;
      margin: 2rem 0;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6aab7e;
      margin-bottom: 1.2rem;
    }

    .favorites {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .fav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #e2f5e9;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      transition: transform 0.15s;
    }

    .fav-item:hover {
      transform: translateX(4px);
    }

    .fav-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .fav-text h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1c3d28;
    }

    .fav-text p {
      font-size: 0.9rem;
      color: #5a8a69;
      margin-top: 0.15rem;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.88rem;
      color: #7ab88a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🌸</div>
    <div class="name">황지현</div>
    <div class="badge-wrap">
      <span class="badge">✦ 마케터</span>
    </div>

    <hr class="divider" />

    <div class="section-title">좋아하는 것들</div>
    <div class="favorites">
      <div class="fav-item">
        <div class="fav-icon">☕</div>
        <div class="fav-text">
          <h3>커피와 카페 탐방</h3>
          <p>새로운 공간에서 영감을 얻는 걸 좋아해요</p>
        </div>
      </div>
      <div class="fav-item">
        <div class="fav-icon">📚</div>
        <div class="fav-text">
          <h3>책 읽기</h3>
          <p>브랜딩과 심리학 관련 책을 즐겨 읽어요</p>
        </div>
      </div>
      <div class="fav-item">
        <div class="fav-icon">🎵</div>
        <div class="fav-text">
          <h3>음악 감상</h3>
          <p>작업할 때 항상 음악이 함께해요</p>
        </div>
      </div>
    </div>

    <div class="footer">황지현의 프로필 페이지</div>
  </div>
</body>
</html>
